           * The payoff BLOOMS; it does not get busier. Low motion is the payload.
           *
           * power3 long tails only. No overshoot, no repeat/yoyo, no Math.random,
           * no drift/push/breathing in the back half, no exit tween.
           * ------------------------------------------------------------------ */

          /* ===== Scene 1 (0.0–2.0) — the button goes solid navy; ONE press ===== */
          var CURSOR_IN_AT = 0.05,
            CURSOR_FADE_DUR = 0.3;
          var CURSOR_MOVE_DUR = 0.82;
          var ENABLE_AT = 0.55,
            ENABLE_DUR = 0.45; // grey → SOLID NAVY (the only solid fill of the video)
          var GLOW_IN_DUR = 0.6,
            GLOW_REST_OPACITY = 0.42;
          /* press-release-spring: linear compression, then a power3.out recovery.
             The rule's back.out is deliberately replaced — this pack bans overshoot. */
          var PRESS_START = 1.1,
            PRESS_DUR = 0.12,
            PRESS_SCALE = 0.955;
          var RELEASE_START = PRESS_START + PRESS_DUR, // adjacency == state continuity
            RELEASE_DUR = 0.52;
          var CURSOR_PRESS_SCALE = 0.86;
          var BURST_OPACITY = 0.6,
            BURST_SCALE = 1.14,
            BURST_DUR = 0.42,
            BURST_SETTLE_DUR = 0.5;

          /* cursor travel: CSS origin (1015, 575) + tip offset (8.3, 5) → button centre (1412, 766) */
          var CURSOR_DX = 389,
            CURSOR_DY = 186;

          /* ===== Scene 2 (2.0–4.0) — THE ONE MOVE: wipe-away-to-reveal ===== */
          var WIPE_AT = 2.0,
            WIPE_DUR = 0.9;
          var WIN_FADE_AT = 2.5,
            WIN_FADE_DUR = 0.45;
          var CARD_AT = 2.2,
            CARD_DUR = 0.6, // motion-blur-streak: position + blur share window AND ease
            CARD_EASE = "power3.out";
          var CARD_Z_FROM = -560,
            CARD_ROTX_FROM = 5,
            CARD_BLUR_PEAK = 16;
          /* ambient-glow-bloom (pulse-on-arrival, FINITE — no breathe, no loop):
             BLOOM_AT + BLOOM_DUR lands exactly on the card's settle → one beat. */
          var BLOOM_AT = 2.0,
            BLOOM_DUR = 0.8, // 2.0 + 0.8 = 2.8 == CARD_AT + CARD_DUR
            BLOOM_PEAK = 0.34, // ≤ 0.45 ceiling
            BLOOM_HOLD = 0.24,
            BLOOM_SETTLE_DUR = 0.7;
          /* svg-path-draw — measured geometry, staggered ~72% so it reads as one draw */
          var RING_AT = 2.86,
            RING_DUR = 0.58;
          var MARK_AT = 3.28,
            MARK_DUR = 0.4;
          /* soft light burst as the stroke closes */
          var CBURST_AT = 3.56,
            CBURST_GROW = 0.32,
            CBURST_FADE = 0.52;
          var H2_AT = 3.52,
            H2_DUR = 0.55;

          /* ===== Scene 3 (4.0–5.6) — the case number as a 120px monument ===== */
          var COUNT_AT = 4.12,
            COUNT_DUR = 1.25; // counting-dynamic-scale: value + font-size in ONE tween
          var CASE_TARGET = 847, // settles on #2026-0847
            SIZE_FROM = 72,
            SIZE_TO = 120;

          /* ===== Scene 4 (5.6–7.0) — the tracking pill ===== */
          var PILL_AT = 5.7,
            PILL_DUR = 0.6; // spring-pop-entrance, smooth register (power3.out)

          /* ===== Scene 5 (7.0–8.341) — the closing line… then TOTAL STILLNESS ===== */
          var TAG_AT = 7.05,
            TAG_DUR = 0.7;

          /* substrate parallax — decelerates fully to rest before Scene 5 */
          var GRID_DUR = 6.4;

          var win = document.getElementById("f05-window");
          var cardEl = document.getElementById("f05-card");
          var caseEl = document.getElementById("f05-case");
          var digitsEl = document.getElementById("f05-case-digits");

          /* svg-path-draw — measure real geometry with getTotalLength(), never guess */
          var ring = document.getElementById("f05-check-ring");
          var mark = document.getElementById("f05-check-mark");
          var ringLen = (ring.getTotalLength && ring.getTotalLength()) || 277;
          var markLen = (mark.getTotalLength && mark.getTotalLength()) || 59;
          ring.style.strokeDasharray = ringLen;
          ring.style.strokeDashoffset = ringLen;
          mark.style.strokeDasharray = markLen;
          mark.style.strokeDashoffset = markLen;

          /* motion-blur-streak (path A, depth-push form): symmetric blur envelope on a
             proxy, seeded once so a seek to the first frame shows the streaked start. */
          var blurP = { v: CARD_BLUR_PEAK };
          var writeCardBlur = function () {
            cardEl.style.filter = blurP.v > 0.08 ? "blur(" + blurP.v + "px)" : "none";
          };
          writeCardBlur();

          var tl = gsap.timeline({ paused: true });

          /* ---------- substrate: the grid parallaxes slower than everything else ---------- */
          tl.fromTo(
            "#f05-grid",
            { x: 0, y: 0 },
            { x: 18, y: -38, duration: GRID_DUR, ease: "power3.out" },
            0
          );

          /* ================= SCENE 1 — the press ================= */
          tl.fromTo(
            "#f05-cursor",
            { opacity: 0 },
            { opacity: 1, duration: CURSOR_FADE_DUR, ease: "power2.out" },
            CURSOR_IN_AT
          );
          tl.fromTo(
            "#f05-cursor",
            { x: 0, y: 0 },
            { x: CURSOR_DX, y: CURSOR_DY, duration: CURSOR_MOVE_DUR, ease: "power2.inOut" },
            CURSOR_IN_AT
          );

          /* disabled grey → SOLID NAVY. The one solid element of the whole video. */
          tl.to(
            "#f05-btn",
            {
              backgroundColor: "#2d3e5e",
              color: "#ffffff",
              duration: ENABLE_DUR,
              ease: "power3.out",
            },
            ENABLE_AT
          );
          tl.to("#f05-btn-hint", { opacity: 0, duration: 0.35, ease: "power2.out" }, ENABLE_AT);
          /* …and it GLOWS. Soft diffuse navy halo — elevation, not a shadow. */
          tl.fromTo(
            "#f05-btn-glow",
            { opacity: 0, scale: 0.9 },
            { opacity: GLOW_REST_OPACITY, scale: 1, duration: GLOW_IN_DUR, ease: "power2.out" },
            ENABLE_AT
          );

          /* press-release-spring — linear input compression… */
          tl.to("#f05-btn", { scale: PRESS_SCALE, duration: PRESS_DUR, ease: "power1.in" }, PRESS_START);
          tl.to(
            "#f05-cursor",
            { scale: CURSOR_PRESS_SCALE, duration: PRESS_DUR, ease: "power1.in" },
            PRESS_START
          );
          /* …then a smooth long-tail recovery. No overshoot anywhere in this pack. */
          tl.to("#f05-btn", { scale: 1, duration: RELEASE_DUR, ease: "power3.out" }, RELEASE_START);
          tl.to("#f05-cursor", { scale: 1, duration: 0.34, ease: "power3.out" }, RELEASE_START);
          /* release burst on the glow layer (the rule's Phase 3, done as glow — never a shadow) */
          tl.to(
            "#f05-btn-glow",
            {
              opacity: BURST_OPACITY,
              scale: BURST_SCALE,
              duration: BURST_DUR,
              ease: "power2.out",
              immediateRender: false,
            },
            RELEASE_START
          );
          tl.to(
            "#f05-btn-glow",
            {
              opacity: GLOW_REST_OPACITY,
              scale: 1,
              duration: BURST_SETTLE_DUR,
              ease: "power2.inOut",
              immediateRender: false,
            },
            RELEASE_START + BURST_DUR
          );

          /* ================= SCENE 2 — THE ONE MOVE ================= */
          /* wipe-away-to-reveal: a diagonal edge sweeps bottom-left → top-right and
             takes the demo UI off frame while the clean card arrives from Z. */
          var wipe = { p: 0 };
          tl.to(
            wipe,
            {
              p: 1,
              duration: WIPE_DUR,
              ease: "power3.inOut",
              onUpdate: function () {
                var L = 112 - 232 * wipe.p; // left-edge crossing, %
                var R = L + 100; // right-edge crossing (constant diagonal slope)
                win.style.clipPath = "polygon(0% 0%, 100% 0%, 100% " + R + "%, 0% " + L + "%)";
              },
            },
            WIPE_AT
          );
          tl.to("#f05-window", { scale: 0.97, duration: WIPE_DUR, ease: "power3.inOut" }, WIPE_AT);
          tl.to("#f05-cursor", { opacity: 0, duration: 0.28, ease: "power2.in" }, 2.02);
          tl.to(
            ["#f05-window", "#f05-win-glow"],
            { opacity: 0, duration: WIN_FADE_DUR, ease: "power2.in" },
            WIN_FADE_AT
          );

          /* ambient-glow-bloom — expands ONCE behind the card, then rests. Finite. */
          tl.fromTo(
            "#f05-bloom",
            { opacity: 0, scale: 0.78 },
            { opacity: BLOOM_PEAK, scale: 1.06, duration: BLOOM_DUR, ease: "power2.out" },
            BLOOM_AT
          );
          tl.to(
            "#f05-bloom",
            {
              opacity: BLOOM_HOLD,
              scale: 1,
              duration: BLOOM_SETTLE_DUR,
              ease: "power2.inOut",
              immediateRender: false,
            },
            BLOOM_AT + BLOOM_DUR
          );

          /* the card ARRIVES FROM Z — real 3D on the carrier, blur on the surface. */
          tl.fromTo(
            "#f05-card-3d",
            { z: CARD_Z_FROM, rotationX: CARD_ROTX_FROM },
            { z: 0, rotationX: 0, duration: CARD_DUR, ease: CARD_EASE },
            CARD_AT
          );
          tl.fromTo(
            "#f05-card",
            { opacity: 0 },
            { opacity: 1, duration: CARD_DUR, ease: CARD_EASE },
            CARD_AT
          );
          /* motion-blur-streak: SAME window + SAME ease → peak blur == peak speed,
             resolving to exactly 0 on the settle. Razor-sharp the instant it stops. */
          tl.to(
            blurP,
            { v: 0, duration: CARD_DUR, ease: CARD_EASE, onUpdate: writeCardBlur },
            CARD_AT
          );

          /* svg-path-draw — the check self-draws, stroke by stroke. Pens don't bounce. */
          tl.fromTo(
            "#f05-check-ring",
            { strokeDashoffset: ringLen },
            { strokeDashoffset: 0, duration: RING_DUR, ease: "power2.out" },
            RING_AT
          );
          tl.fromTo(
            "#f05-check-mark",
            { strokeDashoffset: markLen },
            { strokeDashoffset: 0, duration: MARK_DUR, ease: "power2.out" },
            MARK_AT
          );
          /* …and finishes with a soft light burst as the stroke closes. */
          tl.fromTo(
            "#f05-check-burst",
            { opacity: 0, scale: 0.55 },
            { opacity: 0.72, scale: 1.5, duration: CBURST_GROW, ease: "power2.out" },
            CBURST_AT
          );
          tl.to(
            "#f05-check-burst",
            {
              opacity: 0,
              scale: 2.05,
              duration: CBURST_FADE,
              ease: "power2.in",
              immediateRender: false,
            },
            CBURST_AT + CBURST_GROW
          );

          /* "Caso radicado" — 80px, ink. */
          tl.fromTo(
            "#f05-card-h2",
            { y: 20, opacity: 0 },
            { y: 0, opacity: 1, duration: H2_DUR, ease: "power3.out" },
            H2_AT
          );

          /* ================= SCENE 3 — the 120px monument ================= */
          tl.fromTo(
            "#f05-case",
            { opacity: 0 },
            { opacity: 1, duration: 0.35, ease: "power2.out" },
            COUNT_AT
          );
          /* counting-dynamic-scale: value AND font-size driven by ONE eased tween.
             power3.out — it's data; it must land on its value, never overshoot. */
          var count = { v: 0, fs: SIZE_FROM };
          tl.to(
            count,
            {
              v: CASE_TARGET,
              fs: SIZE_TO,
              duration: COUNT_DUR,
              ease: "power3.out",
              onUpdate: function () {
                digitsEl.textContent = String(Math.round(count.v)).padStart(4, "0");
                caseEl.style.fontSize = count.fs + "px";
              },
            },
            COUNT_AT
          );

          /* ================= SCENE 4 — "En seguimiento" ================= */
          /* spring-pop-entrance, smooth register: scale 0 → 1 on power3.out, no bounce. */
          tl.fromTo(
            "#f05-pill",
            { scale: 0, y: 12, opacity: 0 },
            { scale: 1, y: 0, opacity: 1, duration: PILL_DUR, ease: "power3.out" },
            PILL_AT
          );

          /* ================= SCENE 5 — the line settles, and then EVERYTHING STOPS ======= */
          tl.fromTo(
            "#f05-tagline",
            { y: 26, opacity: 0 },
            { y: 0, opacity: 1, duration: TAG_DUR, ease: "power3.out" },
            TAG_AT
          );
          /* Complete stillness from 7.75s to 8.341s.
             No drift. No push. No breathing. The stop IS the payload of this frame. */

          window.__timelines["05-caso-radicado"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
