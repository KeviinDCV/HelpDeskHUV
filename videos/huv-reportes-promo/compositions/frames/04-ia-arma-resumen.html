      <script>
        (function () {
          window.__timelines = window.__timelines || {};

          var DUR = 12.011;
          var $ = function (id) {
            return document.getElementById(id);
          };

          /* ════════════════════════════════════════════════════════════════
             CAMERA — a real 3D camera (viewport-change + camera-cursor-tracking
             + depth-of-field-blur).  .cam carries
               translate3d(tx,ty,tz) rotateX(rx) rotateY(ry) scale(s)
             inside a perspective:1600px stage, so the camera moves in Z and
             ORBITS; it never merely 2-D pans.

             SAFETY: every pose below was solved against the projection math
             (see project()) so the window's four projected corners stay inside
             x∈[123,1814], y∈[42,838] — fully on-canvas and clear of the y=900
             keep-out.  clampCam() re-derives that bbox EVERY frame and, if any
             seek ever violated it, fits the projected image back into the safe
             rect via a 2-D wrapper OUTSIDE the perspective container.
             ════════════════════════════════════════════════════════════════ */
          var PERSP = 1600;
          var POX = 960,
            POY = 486; // perspective-origin (50% 45%)
          var OX = 960,
            OY = 540; // .cam transform-origin (50% 50%)
          var WIN_L = 260,
            WIN_T = 96,
            WIN_W = 1400,
            WIN_H = 660;
          var SAFE_L = 26,
            SAFE_T = 26,
            SAFE_R = 1894,
            SAFE_B = 890;

          var camEl = $("f04-cam");
          var clampEl = $("f04-clamp");

          var cam = { s: 1, tx: 0, ty: 0, tz: 0, rx: 3, ry: -7 }; // rest pose
          var track = { w: 0 }; // caret-tracking weight (0 → 1 → 0)
          var driver = { t: 0 };

          var RAD = Math.PI / 180;

          function project(px, py, ts) {
            var qx = (px - OX) * cam.s;
            var qy = (py - OY) * cam.s;
            var cy = Math.cos(cam.ry * RAD),
              sy = Math.sin(cam.ry * RAD);
            var cx = Math.cos(cam.rx * RAD),
              sx = Math.sin(cam.rx * RAD);
            var x1 = qx * cy;
            var z1 = -qx * sy;
            var y2 = qy * cx - z1 * sx;
            var z2 = qy * sx + z1 * cx;
            var X = OX + x1 + cam.tx + ts;
            var Y = OY + y2 + cam.ty;
            var Z = z2 + cam.tz;
            var f = PERSP / (PERSP - Z);
            return [POX + (X - POX) * f, POY + (Y - POY) * f];
          }

          /* ── camera-cursor-tracking: the world only starts sliding once the
                caret crosses TRACK_TARGET_X.  Math.min(0, …) is the continuous
                piecewise form from the rule — no hard branch, so no jump. ── */
          var PILL_TEXT_X = 56; // window-local x of the first glyph
          var TRACK_TARGET_X = 640; // stage-space lock point for the caret
          var TRACK_GAIN = 0.55;
          var inTextEl = $("f04-in-text");

          function trackShift() {
            if (track.w <= 0) return 0;
            var caretStageX = WIN_L + PILL_TEXT_X + inTextEl.offsetWidth;
            return Math.min(0, (TRACK_TARGET_X - caretStageX) * TRACK_GAIN) * track.w;
          }

          function applyCamera() {
            var ts = trackShift();
            camEl.style.transform =
              "translate3d(" +
              (cam.tx + ts).toFixed(2) +
              "px," +
              cam.ty.toFixed(2) +
              "px," +
              cam.tz.toFixed(2) +
              "px) rotateX(" +
              cam.rx.toFixed(3) +
              "deg) rotateY(" +
              cam.ry.toFixed(3) +
              "deg) scale(" +
              cam.s.toFixed(4) +
              ")";

            // per-frame clamp of the PROJECTED window box
            var p = [
              project(WIN_L, WIN_T, ts),
              project(WIN_L + WIN_W, WIN_T, ts),
              project(WIN_L, WIN_T + WIN_H, ts),
              project(WIN_L + WIN_W, WIN_T + WIN_H, ts)
            ];
            var l = p[0][0],
              r = p[0][0],
              t = p[0][1],
              b = p[0][1];
            for (var i = 1; i < 4; i++) {
              if (p[i][0] < l) l = p[i][0];
              if (p[i][0] > r) r = p[i][0];
              if (p[i][1] < t) t = p[i][1];
              if (p[i][1] > b) b = p[i][1];
            }
            var k = Math.min(1, (SAFE_R - SAFE_L) / (r - l), (SAFE_B - SAFE_T) / (b - t));
            var l2 = OX + (l - OX) * k,
              r2 = OX + (r - OX) * k;
            var t2 = OY + (t - OY) * k,
              b2 = OY + (b - OY) * k;
            var dx = 0,
              dy = 0;
            if (l2 < SAFE_L) dx = SAFE_L - l2;
            else if (r2 > SAFE_R) dx = SAFE_R - r2;
            if (t2 < SAFE_T) dy = SAFE_T - t2;
            else if (b2 > SAFE_B) dy = SAFE_B - b2;
            clampEl.style.transform =
              "translate(" + dx.toFixed(2) + "px," + dy.toFixed(2) + "px) scale(" + k.toFixed(5) + ")";
          }

          /* ════════════════════════════════════════════════════════════════
             TYPE-ON (discrete-text-sequence — smooth-slice variation)
             Plain, human words.  That plainness IS the argument.
             ════════════════════════════════════════════════════════════════ */
          var MSG = "El computador de facturación no enciende desde esta mañana.";
          var TYPE_START = 2.35,
            TYPE_DUR = 2.6;
          var CARET_ON = 1.95,
            CARET_OFF = 5.72;
          var BLINK_PERIOD = 0.62;
          var caretEl = $("f04-caret");

          /* ════════════════════════════════════════════════════════════════
             THE LIGHT TRAIL (svg-path-draw) — lengths MEASURED, never guessed
             ════════════════════════════════════════════════════════════════ */
          var mainCore = $("f04-trail-core");
          var mainGlow = $("f04-trail-glow");
          var headEl = $("f04-trail-head");
          var MAIN_LEN = mainCore.getTotalLength();
          mainCore.style.strokeDasharray = MAIN_LEN;
          mainCore.style.strokeDashoffset = MAIN_LEN;
          mainGlow.style.strokeDasharray = MAIN_LEN;
          mainGlow.style.strokeDashoffset = MAIN_LEN;

          var BR = [];
          for (var bi = 0; bi < 3; bi++) {
            var bc = $("f04-br-core-" + bi);
            var bg = $("f04-br-glow-" + bi);
            var blen = bc.getTotalLength();
            bc.style.strokeDasharray = blen;
            bc.style.strokeDashoffset = blen;
            bg.style.strokeDasharray = blen;
            bg.style.strokeDashoffset = blen;
            BR.push({ core: bc, glow: bg, len: blen });
          }

          var trail = { p: 0 }; // main-trail draw progress (also rides the head)
          var headO = { v: 0 };

          /* ════════════════════════════════════════════════════════════════
             ASR-KEYWORD-GLOW — lands exactly as the Descripción value SETS
             ════════════════════════════════════════════════════════════════ */
          var ATTACK = 0.13,
            RELEASE = 0.34,
            REST_LEVEL = 0.22;
          var MAX_BLUR = 17,
            MAX_SCALE_BOOST = 0.07; // no overshoot, no bounce
          var WORDS = [
            { el: null, i: 0, start: 8.42, end: 8.6 },
            { el: null, i: 1, start: 8.62, end: 8.74 },
            { el: null, i: 2, start: 8.76, end: 8.98 },
            { el: null, i: 3, start: 9.02, end: 9.42 } // keyword — longest sustain
          ];
          var dws = $("f04-desc-fill").querySelectorAll(".dw");
          for (var wi = 0; wi < WORDS.length; wi++) WORDS[wi].el = dws[wi];

          function envelope(time, start, end) {
            if (time < start) return 0;
            if (time < end) return Math.min((time - start) / ATTACK, 1);
            var releaseEnd = end + RELEASE;
            if (time < releaseEnd) {
              return 1 - ((time - end) / RELEASE) * (1 - REST_LEVEL);
            }
            return REST_LEVEL;
          }

          /* ════════════════════════════════════════════════════════════════
             TYPING INDICATOR (svg-icon-enrichment · pulse) — FINITE.  Scale is
             written through the SVG transform attribute (translate/scale/
             translate), not CSS transform-origin: a <circle>'s bbox-local
             origin would swing it off-centre.
             ════════════════════════════════════════════════════════════════ */
          var TD = [
            { el: $("f04-td0"), cx: 9 },
            { el: $("f04-td1"), cx: 26 },
            { el: $("f04-td2"), cx: 43 }
          ];
          var IND_START = 6.35,
            IND_FADE_A = 9.0,
            IND_FADE_B = 9.45;
          var PULSE_SPEED = 6.4; // rad/s → ~3 breaths across the window
          var PULSE_AMP = 0.28,
            PULSE_OPA = 0.3;

          /* ── background parallax rates (four layers, four speeds) ───────── */
          var gridEl = $("f04-grid"),
            bloomA = $("f04-bloom-a"),
            bloomB = $("f04-bloom-b");

          /* ════════════════════════════════════════════════════════════════
             ONE per-frame writer, driven off the timeline clock
             ════════════════════════════════════════════════════════════════ */
          function frameUpdate() {
            var t = driver.t;

            // 1 · ground parallax — each substrate layer drifts at its own rate
            gridEl.style.transform =
              "translate(" + (-t * 2.6).toFixed(2) + "px," + (-t * 1.2).toFixed(2) + "px)";
            bloomA.style.transform =
              "translate(" + (t * 4.4).toFixed(2) + "px," + (t * 1.1).toFixed(2) + "px)";
            bloomB.style.transform =
              "translate(" + (-t * 1.4).toFixed(2) + "px," + (t * 2.2).toFixed(2) + "px)";

            // 2 · camera (+ caret tracking) and the projected-bbox clamp
            applyCamera();

            // 3 · type-on + deterministic caret blink
            var n = 0;
            if (t >= TYPE_START) {
              n = Math.floor(Math.min((t - TYPE_START) / TYPE_DUR, 1) * MSG.length);
            }
            var slice = MSG.slice(0, n);
            if (inTextEl.textContent !== slice) inTextEl.textContent = slice;

            var cv = 0;
            if (t >= CARET_ON && t <= CARET_OFF) {
              cv = Math.sin(((t - CARET_ON) / BLINK_PERIOD) * Math.PI * 2) > 0 ? 1 : 0.15;
            }
            caretEl.style.opacity = String(cv);

            // 4 · the light trail — draw + the travelling head riding the path
            if (trail.p > 0) {
              var off = MAIN_LEN * (1 - trail.p);
              mainCore.style.strokeDashoffset = off;
              mainGlow.style.strokeDashoffset = off;
              var pt = mainCore.getPointAtLength(MAIN_LEN * trail.p);
              headEl.setAttribute("cx", pt.x.toFixed(2));
              headEl.setAttribute("cy", pt.y.toFixed(2));
            }
            headEl.style.opacity = headO.v.toFixed(3);

            // 5 · keyword glow envelope on the resolved Descripción value
            for (var w = 0; w < WORDS.length; w++) {
              var wd = WORDS[w];
              var env = envelope(t, wd.start, wd.end);
              wd.el.style.textShadow =
                "0 0 " +
                (MAX_BLUR * env).toFixed(2) +
                "px rgba(45,62,94," +
                (0.05 + env * 0.34).toFixed(3) +
                ")";
              wd.el.style.transform = "scale(" + (1 + MAX_SCALE_BOOST * env).toFixed(4) + ")";
            }

            // 6 · typing indicator — finite pulse, amplitude bled to 0 by 9.45
            var amp = 0;
            if (t >= IND_START) {
              amp =
                t <= IND_FADE_A
                  ? 1
                  : Math.max(0, 1 - (t - IND_FADE_A) / (IND_FADE_B - IND_FADE_A));
            }
            var ph = Math.max(0, t - IND_START) * PULSE_SPEED;
            for (var d = 0; d < 3; d++) {
              var sN = Math.sin(ph - d * 0.9);
              var sc = 1 + sN * PULSE_AMP * amp;
              var op = 0.75 + sN * PULSE_OPA * amp;
              TD[d].el.setAttribute(
                "transform",
                "translate(" +
                  TD[d].cx +
                  " 12) scale(" +
                  sc.toFixed(4) +
                  ") translate(" +
                  -TD[d].cx +
                  " -12)"
              );
              TD[d].el.style.opacity = op.toFixed(3);
            }
          }

          // timeline-level onUpdate fires AFTER its children render, so every
          // proxy already holds THIS seek's value — never a stale frame.
          var tl = gsap.timeline({ paused: true, onUpdate: frameUpdate });

          /* ── build-time state guards.  v1 shipped a GHOST of the user bubble
                floating over the input from t=0 because a fromTo stamped its
                from-state at build.  Every entrance below is
                immediateRender:false AND backed by a CSS opacity:0 + this
                tl.set, so ANY seek before the tween renders correctly. ────── */
          tl.set("#f04-cursor", { x: 1290, y: 636, scale: 1 }, 0);
          tl.set(
            ["#f04-rip-a1", "#f04-rip-a2", "#f04-rip-a3", "#f04-rip-b1"],
            { scale: 0, opacity: 0 },
            0
          );
          tl.set("#f04-user-new", { opacity: 0, y: 120 }, 0);
          tl.set("#f04-typing", { opacity: 0, y: 12 }, 0);
          tl.set("#f04-in-move", { y: 0, opacity: 1 }, 0);
          tl.set(["#f04-dbar-0", "#f04-dbar-1", "#f04-dbar-2"], { scaleX: 0 }, 0);
          tl.set("#f04-desc-fill", { opacity: 0, y: 5 }, 0);
          tl.set(["#f04-dfill-0", "#f04-dfill-1", "#f04-dfill-2"], { opacity: 0, y: 4 }, 0);

          /* ══ SCENE 1 (0.0–2.2) — the cursor reaches for the input ══════════
             The window is ALREADY here (continuation of frame 3) — hero visible
             at t=0.  The drawn cursor glides in, clicks: compression + ripple
             (cursor-click-ripple), the pill presses and releases
             (press-release-spring — power3 substituted for back.out, the
             project bans overshoot), and the input takes focus with a GLOWING
             navy ring.                                                        */
          tl.to(cam, { s: 1.015, tx: 10, ty: 8, tz: 38, duration: 1.4, ease: "power3.inOut" }, 0.4);

          tl.to("#f04-cursor", { x: 299, y: 597, duration: 0.9, ease: "power3.out" }, 0.32);

          // click — cursor compresses MORE than the target (it is the actor)
          tl.to("#f04-cursor", { scale: 0.85, duration: 0.09, ease: "power2.in" }, 1.55);
          tl.to("#f04-cursor", { scale: 1, duration: 0.12, ease: "power3.out" }, 1.64);
          // press → release: RELEASE_START == PRESS_START + PRESS_DUR (state continuity)
          tl.to("#f04-input", { scale: 0.985, duration: 0.1, ease: "power1.in" }, 1.55);
          tl.to("#f04-input", { scale: 1, duration: 0.45, ease: "power3.out" }, 1.65);

          tl.fromTo(
            "#f04-burst",
            { scale: 1, opacity: 0 },
            { scale: 2.6, opacity: 0.5, duration: 0.5, ease: "power2.out", immediateRender: false },
            1.65
          );
          tl.to("#f04-burst", { opacity: 0, duration: 0.55, ease: "power2.in" }, 2.1);

          // ripple burst — 3 rings staggered from the exact click point.
          // immediateRender:false holds them at scale 0 / opacity 0 until the
          // click, so they never pre-render at the wrong size at t=0.
          tl.fromTo(
            ["#f04-rip-a1", "#f04-rip-a2", "#f04-rip-a3"],
            { scale: 0, opacity: 0.5 },
            {
              scale: 4.2,
              opacity: 0,
              duration: 0.72,
              ease: "power2.out",
              stagger: 0.09,
              immediateRender: false
            },
            1.55
          );

          // the focus ring GLOWS navy
          tl.fromTo(
            "#f04-ring",
            { opacity: 0, scale: 1.035 },
            { opacity: 1, scale: 1, duration: 0.5, ease: "power3.out", immediateRender: false },
            1.7
          );
          tl.fromTo(
            "#f04-halo",
            { opacity: 0 },
            { opacity: 1, duration: 0.6, ease: "power2.out", immediateRender: false },
            1.72
          );
          tl.to("#f04-in-ph", { opacity: 0, duration: 0.28, ease: "power2.out" }, 2.0);

          /* ══ SCENE 2 (2.2–5.2) — the message TYPES IN LIVE ════════════════
             Camera pushes in Z toward the input and then TRACKS the advancing
             caret (camera-cursor-tracking).  RESUMEN racks softly out of focus
             (depth-of-field-blur, focal pull) — the chat is the subject.      */
          tl.to(cam, { s: 1.04, tx: 24, ty: 14, tz: 100, duration: 2.0, ease: "power3.inOut" }, 2.2);
          tl.to(track, { w: 1, duration: 0.35, ease: "power1.inOut" }, 2.35);
          tl.to("#f04-res-inner", { "--dof": "2.6px", opacity: 0.7, duration: 0.9, ease: "power2.inOut" }, 2.4);

          /* ══ SCENE 3 (5.2–7.0) — SEND.  cut-the-curve, upward ═════════════
             The cursor presses send; the pill's text accelerates UP and the
             bubble continues that same upward motion into the thread — one
             move, hard-cut at peak velocity.  A single blur proxy feeds BOTH
             sides, so the peak blur MATCHES exactly at the cut frame.         */
          tl.to(cam, { s: 1.03, tx: 14, ty: 12, tz: 72, duration: 1.1, ease: "power2.inOut" }, 5.05);
          tl.to(track, { w: 0, duration: 0.5, ease: "power2.inOut" }, 5.2);

          tl.to("#f04-cursor", { x: 870, y: 593, duration: 0.5, ease: "power3.out" }, 4.98);
          tl.to("#f04-cursor", { scale: 0.85, duration: 0.09, ease: "power2.in" }, 5.55);
          tl.to("#f04-cursor", { scale: 1, duration: 0.12, ease: "power3.out" }, 5.64);
          tl.to("#f04-send", { scale: 0.9, duration: 0.1, ease: "power1.in" }, 5.55);
          tl.to("#f04-send", { scale: 1, duration: 0.42, ease: "power3.out" }, 5.65);
          tl.to(["#f04-send-p1", "#f04-send-p2"], { stroke: "#2D3E5E", duration: 0.3, ease: "power2.out" }, 5.58);

          tl.fromTo(
            "#f04-rip-b1",
            { scale: 0, opacity: 0.5 },
            { scale: 3.2, opacity: 0, duration: 0.65, ease: "power2.out", immediateRender: false },
            5.57
          );
          tl.to(["#f04-ring", "#f04-halo"], { opacity: 0, duration: 0.35, ease: "power2.out" }, 5.72);

          // motion-blur-streak — proxy → feGaussianBlur stdDeviation "0 Y".
          var blurNode = $("f04-streak-blur");
          var blurProxy = { v: 0 };
          var writeBlur = function () {
            blurNode.setAttribute("stdDeviation", "0 " + blurProxy.v.toFixed(2));
          };
          writeBlur(); // seed frame 0

          // exit — accelerates up, blur climbs to the 10px text-scale peak
          tl.to("#f04-in-move", { y: -120, duration: 0.3, ease: "power4.in" }, 5.7);
          tl.to("#f04-in-move", { opacity: 0, duration: 0.18, ease: "none" }, 5.7);
          tl.to(blurProxy, { v: 10, duration: 0.3, ease: "power3.in", onUpdate: writeBlur }, 5.7);

          // HARD CUT at peak velocity + peak blur — never both visible
          tl.set("#f04-in-move", { opacity: 0 }, 6.0);
          tl.set("#f04-user-new", { opacity: 0.35, y: 120 }, 6.0);

          // entry — the bubble picks the motion up at matched velocity
          tl.to("#f04-user-new", { y: 0, opacity: 1, duration: 0.3, ease: "power4.out" }, 6.0);
          tl.to(blurProxy, { v: 0, duration: 0.3, ease: "power4.out", onUpdate: writeBlur }, 6.0);

          // Evarisbot starts thinking — three-dot indicator, FINITE
          tl.fromTo(
            "#f04-typing",
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.45, ease: "power3.out", immediateRender: false },
            6.35
          );

          /* ══ SCENE 4 (7.0–9.2) — ⭐ THE TRAIL ═══════════════════════════════
             A glowing navy thread EMANATES from the user's bubble, arcs across
             the window and lands on RESUMEN.  The camera pans right and ORBITS
             in 3D onto the panel; the chat racks OUT of focus.  On arrival the
             Descripción field IGNITES and resolves — keyword glow lands exactly
             as it sets.  This is "la IA lo entiende, lo clasifica", made image. */
          tl.to(
            cam,
            {
              s: 1.02,
              tx: -150,
              ty: 16,
              tz: 75,
              rx: 2,
              ry: -11.5,
              duration: 1.85,
              ease: "power3.inOut"
            },
            7.05
          );
          // rack focus — chat releases, RESUMEN lands sharp (adjacent tweens on
          // the same --dof channel = seamless hand-off)
          tl.to("#f04-chat-card", { "--dof": "5px", opacity: 0.62, duration: 1.0, ease: "power2.inOut" }, 7.1);
          tl.to("#f04-res-inner", { "--dof": "0px", opacity: 1, duration: 1.0, ease: "power2.inOut" }, 7.1);

          // the bubble releases its light
          tl.fromTo(
            "#f04-emanate",
            { opacity: 0, scale: 0.7 },
            { opacity: 0.9, scale: 1, duration: 0.35, ease: "power2.out", immediateRender: false },
            7.05
          );
          tl.to("#f04-emanate", { opacity: 0.3, duration: 0.8, ease: "power2.out" }, 7.4);

          // the trail DRAWS itself
          tl.to(headO, { v: 1, duration: 0.16, ease: "power1.out" }, 7.14);
          tl.to(trail, { p: 1, duration: 1.3, ease: "power2.inOut" }, 7.15);
          tl.to(headO, { v: 0, duration: 0.45, ease: "power2.out" }, 8.34);

          // IGNITION — Descripción
          tl.fromTo(
            "#f04-desc-halo",
            { opacity: 0, scale: 0.85 },
            { opacity: 1, scale: 1, duration: 0.24, ease: "power2.out", immediateRender: false },
            8.22
          );
          tl.to("#f04-desc-halo", { opacity: 0.18, duration: 0.7, ease: "power2.out" }, 8.46);
          tl.to("#f04-desc-dot", { backgroundColor: "#FF8904", scale: 1.25, duration: 0.2, ease: "power2.out" }, 8.24);
          tl.to("#f04-desc-dot", { scale: 1, duration: 0.35, ease: "power2.out" }, 8.44);
          tl.to("#f04-desc-dot", { backgroundColor: "#2D3E5E", duration: 0.4, ease: "power2.out" }, 8.66);

          tl.to("#f04-desc-pend", { opacity: 0, duration: 0.28, ease: "power2.out" }, 8.3);
          tl.fromTo(
            "#f04-desc-fill",
            { opacity: 0, y: 5 },
            { opacity: 1, y: 0, duration: 0.45, ease: "power3.out", immediateRender: false },
            8.36
          );

          /* ══ SCENE 5 (9.2–12.011) — the trail BRANCHES; the panel assembles
             ITSELF.  Each row IGNITES with a glow pulse as the light reaches it
             (stat-bars-and-fills for the fill, index-derived stagger — never
             Math.random).  Then everything CLOSES STILL.                      */
          for (var i = 0; i < 3; i++) {
            var at = 9.25 + i * 0.52; // stagger derives from the INDEX
            var b = BR[i];
            tl.to([b.core, b.glow], { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" }, at);

            var land = at + 0.46; // the light reaches the row
            tl.fromTo(
              "#f04-dhalo-" + i,
              { opacity: 0, scale: 0.85 },
              { opacity: 1, scale: 1, duration: 0.22, ease: "power2.out", immediateRender: false },
              land
            );
            tl.to("#f04-dhalo-" + i, { opacity: 0.16, duration: 0.65, ease: "power2.out" }, land + 0.22);

            tl.to("#f04-ddot-" + i, { backgroundColor: "#FF8904", scale: 1.25, duration: 0.18, ease: "power2.out" }, land);
            tl.to("#f04-ddot-" + i, { scale: 1, duration: 0.32, ease: "power2.out" }, land + 0.18);
            tl.to("#f04-ddot-" + i, { backgroundColor: "#2D3E5E", duration: 0.38, ease: "power2.out" }, land + 0.34);

            tl.to("#f04-dpend-" + i, { opacity: 0, duration: 0.24, ease: "power2.out" }, land + 0.04);
            tl.fromTo(
              "#f04-dfill-" + i,
              { opacity: 0, y: 4 },
              { opacity: 1, y: 0, duration: 0.4, ease: "power3.out", immediateRender: false },
              land + 0.1
            );
            // the fill and the value peak together — one beat, not two
            tl.to("#f04-dbar-" + i, { scaleX: 1, duration: 0.6, ease: "power2.out" }, land + 0.06);
          }

          // ambient-glow-bloom — blooms ONCE under the assembled panel, rests
          tl.fromTo(
            "#f04-res-bloom",
            { opacity: 0 },
            { opacity: 0.6, duration: 0.5, ease: "power2.out", immediateRender: false },
            10.85
          );
          tl.to("#f04-res-bloom", { opacity: 0.34, duration: 0.6, ease: "power2.out" }, 11.35);

          // the camera creeps a hair further and LOCKS.  No exit tween — the
          // root transition is the exit (this is not the final frame).
          tl.to(
            cam,
            { s: 1.03, tx: -160, ty: 26, tz: 88, rx: 1.9, ry: -12, duration: 1.7, ease: "power3.inOut" },
            9.3
          );

          /* ── time driver: holds the timeline at exactly DUR and feeds the
                per-frame writer (camera + clamp, parallax, typing, trail head,
                glow envelope, indicator pulse) ─────────────────────────────── */
          tl.to(driver, { t: DUR, duration: DUR, ease: "none" }, 0);

          // paint t=0 synchronously so the very first frame is already correct
          frameUpdate();

          window.__timelines["04-ia-arma-resumen"] = tl;
        })();
      </script>
    </template>
