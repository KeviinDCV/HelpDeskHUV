              onUpdate: writeBlur,
            },
            MASCOT_AT,
          );

          /* The bloom lands ON the mascot's settle (BLOOM_START + BLOOM_DUR = 3.95) so glow
             and character resolve as ONE beat — then it rests. Peak stays under the 0.45 wash
             ceiling; the halo colour is darker + more saturated than the surface it backs. */
          var GLOW_START_SCALE = 0.84;
          var GLOW_PEAK_OPACITY = 0.32;
          var BLOOM_DUR = 0.72;
          var BLOOM_START = 3.23;

          tl.fromTo(
            "#f07-mascot-glow",
            { opacity: 0, scale: GLOW_START_SCALE },
            {
              opacity: GLOW_PEAK_OPACITY,
              scale: 1,
              duration: BLOOM_DUR,
              ease: "power2.out",
              immediateRender: false,
            },
            BLOOM_START,
          );

          /* ═══════════════════════════════════════════════════════════════════════════
             SCENE 4 (4.5–5.781s) — the closing line settles. And then nothing: the last
             motion in the video ends at 5.25s and the frame holds as a poster — mark, name,
             address, character. Complete stillness. No drift, no push, no jitter.
             ═══════════════════════════════════════════════════════════════════════════ */
          tl.fromTo(
            "#f07-kicker-line",
            { opacity: 0, y: 26 },
            { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
            4.55,
          );

          window.__timelines["07-cta"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
