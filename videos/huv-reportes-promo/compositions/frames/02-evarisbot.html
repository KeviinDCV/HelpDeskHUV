             ════════════════════════════════════════════════════════════════ */
          const DURATION = 8.917;

          const grid = document.getElementById("f02-grid");
          const gba = document.getElementById("f02-gba");
          const gbb = document.getElementById("f02-gbb");
          const bloom = document.getElementById("f02-bloom");
          const ringA = document.getElementById("f02-ring-a");
          const ringB = document.getElementById("f02-ring-b");
          const yano = document.getElementById("f02-yano");
          const jitter = document.getElementById("f02-jitter");
          const depth = document.getElementById("f02-depth");
          const mascot = document.getElementById("f02-mascot");
          const eyebrow = document.getElementById("f02-eyebrow");
          const nameEl = document.getElementById("f02-name");
          const caret = document.getElementById("f02-caret");
          const pill = document.getElementById("f02-pill");
          const bodyLine = document.getElementById("f02-body");
          const nodes = [

            document.getElementById("f02-n2"),
            document.getElementById("f02-n3"),
            document.getElementById("f02-n4"),
          ];

          const tl = gsap.timeline({ paused: true });

          /* ══ THE LIGHT FIELD (runs under the whole shot) ══════════════════
             The grid substrate and the two ground blooms drift at DIFFERENT,
             very slow rates — the parallax that gives the ground depth. Finite
             linear tweens (ease "none"), never a loop. */
          tl.fromTo(
            grid,
            { x: -14, y: -24, scale: 1 },
            { x: 8, y: 16, scale: 1.03, duration: DURATION, ease: "none" },
            0,
          );
          tl.fromTo(
            gba,
            { x: 16, y: 12 },
            { x: -12, y: -10, duration: DURATION, ease: "none" },
            0,
          );
          tl.fromTo(
            gbb,
            { x: -10, y: -6 },
            { x: 8, y: 6, duration: DURATION, ease: "none" },
            0,
          );

          /* ══ SCENE 1 (0.0–1.6) — «Ya no.» ════════════════════════════════
             HARD CUT: opacity is 1 in the from-state, so the line is simply
             THERE at frame 0 — no fade-up. It then LANDS via spring-pop-entrance
             in its smooth long-tail register: power3.out decelerates cleanly into
             the resting size. NO overshoot, no back.out. ~200px, 700, ink,
             dead-centre on the shared anchor (960, 410). It dominates, alone. */
          tl.fromTo(
            yano,
            { scale: 1.14, y: -18, opacity: 1 },
            { scale: 1, y: 0, opacity: 1, duration: 0.8, ease: "power3.out" },
            0,
          );

          /* ══ SCENE 2 (1.6–3.8) — THE ANSWER ARRIVES, AND BRINGS THE LIGHT ══
             scale-swap-transition, textbook: two coordinated tweens fired at ONE
             trigger around ONE shared centre + transform-origin.
               · outgoing (.yano)   scale 1 → EXIT_SCALE, opacity → 0, power2.in
                                    (+ a rise, handing off to the eyebrow slot)
               · incoming (mascot)  scale EXIT_SCALE → 1, opacity 0 → 1, starting
                                    OVERLAP seconds before the exit finishes.
             House register overrides the recipe's back.out: power3.out, no bounce.
             Incoming z-index (5) > outgoing (3) so the fade-tail can't bleed. */
          const TRIGGER = 1.7;
          const EXIT_DUR = 0.42;
          const OVERLAP = 0.16;
          const EXIT_SCALE = 0.55;
          const ENTER_AT = TRIGGER + EXIT_DUR - OVERLAP; // 1.96
          const ENTER_DUR = 0.9; // mascot settles ≈ 2.86s — on the word "Evarisbot"

          tl.to(
            yano,
            { scale: EXIT_SCALE, y: -46, opacity: 0, duration: EXIT_DUR, ease: "power2.in" },
            TRIGGER,
          );

          /* …and the line resolves into its eyebrow slot at the top while the big
             one is still dissolving — it reads as "Ya no." shrinking and rising. */
          tl.fromTo(
            eyebrow,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.58, ease: "power3.out" },
            1.9,
          );

          /* He PUSHES FORWARD FROM DEEP Z. Two locked tweens, same window + same
             ease, inside a perspective: 1600px box:
               · .mascot-depth  translateZ −680 → 0   (true perspective foreshortening)
               · .mascot        scale EXIT_SCALE → 1  (the scale-swap's incoming half)
             Apparent size at the start ≈ 0.55 × 1600/2280 ≈ 0.39 → he arrives from
             far back in the frame, not from a flat pop. */
          tl.fromTo(depth, { z: -680 }, { z: 0, duration: ENTER_DUR, ease: "power3.out" }, ENTER_AT);
          tl.fromTo(
            mascot,
            { scale: EXIT_SCALE, opacity: 0 },
            { scale: 1, opacity: 1, duration: ENTER_DUR, ease: "power3.out" },
            ENTER_AT,
          );

          /* motion-blur-streak — Path A, "camera push-through" variation: the smear
             is depth-wise, so stdDeviation is SYMMETRIC ("B B"), not directional.
             GSAP can't tween an SVG attribute, so we tween a proxy and write it back
             each frame. The envelope shares the push's EXACT window and ease, so
             peak-blur lands on peak-speed and resolves to 0 the instant he settles —
             he streaks in out of soft focus and snaps razor-sharp. Seeded once at
             setup so a seek to frame 0 renders the streaked start state. */
          const blurNode = document.getElementById("f02-streak-blur");
          const PEAK_BLUR = 26;
          const blurProxy = { v: PEAK_BLUR };
          const writeBlur = () =>
            blurNode.setAttribute("stdDeviation", blurProxy.v.toFixed(2) + " " + blurProxy.v.toFixed(2));
          writeBlur();

          tl.fromTo(
            blurProxy,
            { v: PEAK_BLUR },
            {
              v: 0,
              duration: ENTER_DUR,
              ease: "power3.out",
              immediateRender: false,
              onUpdate: writeBlur,
            },
            ENTER_AT,
          );

          /* ambient-glow-bloom — hero-bloom form, bloom-and-hold (FINITE: no
             breathe loop, no yoyo). The halo EXPANDS OUTWARD FROM HIS CENTRE
             (scale 0.22 → 1) and BLOOM_START + BLOOM_DUR (2.00 + 0.86 = 2.86)
             lands exactly on his settle, so the light and the answer read as ONE
             beat. Peak alpha is carried by the gradient itself (0.14 at the core)
             — far under the 0.45 wash ceiling, and the glow sits BEHIND him
             (z-index 1 vs 5). No box-shadow on the hero: the halo is the glow. */
          tl.fromTo(
            bloom,
            { opacity: 0, scale: 0.22 },
            { opacity: 1, scale: 1, duration: 0.86, ease: "power2.out" },
            2.0,
          );

          /* Two concentric rings SWEEP OUTWARD ONCE and dissolve. Each is a single
             finite tween: they start small enough to be hidden behind his disc, so
             they appear to emanate from him. Per-ring variation is index-derived
             (start times, end scale, alpha) — never random. */
          tl.fromTo(
            ringA,
            { scale: 0.48, opacity: 0.62 },
            { scale: 3.1, opacity: 0, duration: 1.25, ease: "power2.out", immediateRender: false },
            2.4,
          );
          tl.fromTo(
            ringB,
            { scale: 0.48, opacity: 0.44 },
            { scale: 2.7, opacity: 0, duration: 1.25, ease: "power2.out", immediateRender: false },
            2.66,
          );

          /* ══ SCENE 3 (3.8–5.8) — the name types on, the constellation lands ══
             orbit-3d-entry, ADAPTED: phase 1 only. Each node is positioned at its
             RESTING slot in CSS and flips in IN PLACE from a 3D orientation
             (rotateX / rotateY / translateZ / scale) inside a perspective: 1400px
             stage — then STOPS. Phase 2 (the continuous elliptical orbit) is
             deliberately omitted: the renderer seeks frame-by-frame and an infinite
             orbit is banned. They arrive, they settle, they hold.
             The recipe's back.out flip is swapped for power3.out — no overshoot. */
          const NODES_AT = 4.86;
          const NODE_STAGGER = 0.11; // 4 × 0.11 = 0.44s — the group lands as one beat
          const NODE_ENTRY_DUR = 0.62;

          nodes.forEach((el, i) => {
            tl.fromTo(
              el,
              { rotateX: 82, rotateY: -48, z: -280, scale: 0.35, opacity: 0 },
              {
                rotateX: 0,
                rotateY: 0,
                z: 0,
                scale: 1,
                opacity: 1,
                duration: NODE_ENTRY_DUR,
                ease: "power3.out",
              },
              NODES_AT + i * NODE_STAGGER,
            );
          });

          /* discrete-text-sequence — an array of {t, text, segment, color} states,
             reverse-searched every frame for the latest entry whose t has passed.
             context-sensitive-cursor — the caret takes the ACTIVE SEGMENT's colour
             (text-light while typing → primary the instant the brand name lands),
             blinks off a deterministic sine, and holds solid while keys are landing. */
          const NAME = "Evarisbot";
          const T_TYPE_START = 3.98;
          const CHAR_STEP = 0.105;
          const T_TYPE_END = T_TYPE_START + NAME.length * CHAR_STEP; // 4.925
          const COLOR_TYPING = "#9A9A9A"; // text-light
          const COLOR_BRAND = "#2D3E5E"; // primary

          const SEQUENCE = [{ t: 0, text: "", segment: "idle", color: COLOR_TYPING }];
          for (let i = 1; i <= NAME.length; i++) {
            SEQUENCE.push({
              t: T_TYPE_START + (i - 1) * CHAR_STEP,
              text: NAME.slice(0, i),
              segment: "typing",
              color: COLOR_TYPING,
            });
          }
          SEQUENCE.push({ t: T_TYPE_END, text: NAME, segment: "brand", color: COLOR_BRAND });

          function entryAt(time) {
            for (let i = SEQUENCE.length - 1; i >= 0; i--) {
              if (time >= SEQUENCE[i].t) return SEQUENCE[i];
            }
            return SEQUENCE[0];
          }

          // Caret envelope — fades in just before the first keystroke, retires
          // before the pill lands. Pure function of t.
          const T_CARET_IN = 3.78;
          const T_CARET_IN_END = 3.98;
          const T_CARET_OUT = 5.8;
          const T_CARET_OUT_END = 6.1;
          const BLINK_PERIOD = 0.72;

          function caretAlphaAt(t) {
            if (t < T_CARET_IN) return 0;
            if (t < T_CARET_IN_END) return (t - T_CARET_IN) / (T_CARET_IN_END - T_CARET_IN);
            if (t < T_CARET_OUT) return 1;
            if (t < T_CARET_OUT_END) return 1 - (t - T_CARET_OUT) / (T_CARET_OUT_END - T_CARET_OUT);
            return 0;
          }

          /* ══ SCENE 5's stillness — subtle jitter, and nothing more ═══════════
             A bounded ±2px sine on the mascot, enveloped to ZERO before the last
             frame so the shot ends dead still. Written on .mascot-jitter, a wrapper
             GSAP NEVER tweens, so it can never collide with a GSAP transform. */
          const T_JITTER_START = 5.2;
          const JITTER_AMP = 2.0;
          const JITTER_CYCLES = 1.5;
          const JITTER_FADE_FRAC = 0.25;

          function jitterYAt(t) {
            if (t <= T_JITTER_START) return 0;
            const u = Math.min(1, (t - T_JITTER_START) / (DURATION - T_JITTER_START));
            const env = u < 1 - JITTER_FADE_FRAC ? 1 : Math.max(0, (1 - u) / JITTER_FADE_FRAC);
            return Math.sin(2 * Math.PI * JITTER_CYCLES * u) * JITTER_AMP * env;
          }

          // ONE driver → one onUpdate. Everything it writes is a pure function of
          // time, so every seek reproduces the identical frame.
          const driver = { t: 0 };

          function renderAt(t) {
            const entry = entryAt(t);
            nameEl.textContent = entry.text;

            caret.style.background = entry.color;
            const isTyping = t >= T_TYPE_START && t <= T_TYPE_END + 0.12;
            const blinkOn = isTyping ? 1 : Math.sin((2 * Math.PI * t) / BLINK_PERIOD) > 0 ? 1 : 0;
            caret.style.opacity = String(caretAlphaAt(t) * blinkOn);

            jitter.style.transform = "translateY(" + jitterYAt(t).toFixed(3) + "px)";
          }

          tl.to(
            driver,
            { t: DURATION, duration: DURATION, ease: "none", onUpdate: () => renderAt(driver.t) },
            0,
          );

          /* ══ SCENE 4 (5.8–7.4) — the tag-pill ════════════════════════════════
             spring-pop-entrance, smooth long-tail (power3.out), NO overshoot.
             accent-light fill / primary text / 100px radius, straight from frame.md. */
          tl.fromTo(
            pill,
            { scale: 0, y: 14, opacity: 0 },
            { scale: 1, y: 0, opacity: 1, duration: 0.62, ease: "power3.out" },
            5.95,
          );

          /* ══ SCENE 5 (7.4–8.917) — the body line settles, then EVERYTHING HOLDS ══
             text-muted, a quiet close. No exit tween — this is not the final frame;
             the root transition IS the exit. */
          tl.fromTo(
            bodyLine,
            { opacity: 0, y: 18 },
            { opacity: 1, y: 0, duration: 0.72, ease: "power3.out" },
            7.48,
          );

          // Land every driver-owned value for the very first rendered frame.
          renderAt(0);

          window.__timelines["02-evarisbot"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
